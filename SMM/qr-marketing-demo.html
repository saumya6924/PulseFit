<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Code Marketing Demo | PulseFit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- BACK BUTTON -->
<a href="mobile-marketing.html" class="back-btn">← Back</a>

<!-- NAVBAR -->
<nav class="main-navbar">
  <div class="nav-logo">PulseFit</div>
</nav>

<!-- HEADER -->
<section class="demo-header">
  <h1>QR Code Marketing Demo</h1>
  <p>Scan QR codes to instantly access PulseFit offers</p>
</section>

<!-- PACKAGING + QR -->
<div class="qr-demo-container">

  <!-- PRODUCT BOX -->
  <div class="product-box">
    <h3>PulseFit Smartwatch</h3>

    <!-- QR CODE -->
    <div class="qr-code"></div>

    <p>Scan to Get 30% Discount</p>
  </div>

  <!-- PHONE SCAN UI -->
  <div class="phone">

    <div class="status-bar">Camera</div>

    <div class="scanner">
      <div class="scan-frame"></div>
    </div>

    <!-- RESULT -->
    <div class="scan-result">
      <p>✔ QR Detected</p>
      <p>Opening PulseFit Website...</p>
    </div>

  </div>

</div>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 PulseFit. All rights reserved.</p>
</footer>

</body>
</html>
