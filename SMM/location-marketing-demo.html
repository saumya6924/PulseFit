<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Location-Based Marketing Demo | PulseFit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- BACK BUTTON -->
<a href="mobile-marketing.html" class="back-btn">← Back</a>

<!-- NAVBAR -->
<nav class="main-navbar">
  <div class="nav-logo">PulseFit</div>
</nav>

<!-- HEADER -->
<section class="demo-header">
  <h1>Location-Based Marketing Demo</h1>
  <p>Target users with GPS-based offers and proximity ads</p>
</section>

<!-- DEMO AREA -->
<div class="location-container">

  <!-- PHONE MOCKUP -->
  <div class="phone">

    <!-- STATUS -->
    <div class="status-bar">Location Enabled 📍</div>

    <!-- MAP AREA -->
    <div class="map">
      <div class="user-location"></div>

      <!-- STORE PIN -->
      <div class="store-pin"></div>
    </div>

    <!-- GPS POPUP -->
    <div class="location-popup">
      <h4>Nearby Offer 🎯</h4>
      <p>PulseFit Store 500m Away</p>
      <p>🔥 Get 20% OFF Today</p>
    </div>

    <!-- PROXIMITY AD -->
    <div class="proximity-ad">
      <span>Sponsored</span>
      <p>Visit PulseFit Store Now</p>
    </div>

  </div>

</div>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 PulseFit. All rights reserved.</p>
</footer>

</body>
</html>
