<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout | PulseFit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="main-navbar">
  <div class="nav-logo">PulseFit</div>
</nav>

<!-- HEADER -->
<section class="checkout-header">
  <h1>Complete Your Purchase</h1>
</section>

<div class="checkout-container">

  <!-- PRODUCT DETAILS -->
  <div class="checkout-box">
    <h2>Product</h2>
    <p><strong>PulseFit Smartwatch</strong></p>
    <p>₹2,999</p>
    <ul>
      <li>Heart Rate Monitoring</li>
      <li>Sleep Tracking</li>
      <li>Water Resistant</li>
    </ul>
  </div>

  <!-- SHIPPING FORM -->
  <div class="checkout-box">
    <h2>Shipping Details</h2>
    <input type="text" placeholder="Full Name">
    <input type="text" placeholder="Address">
    <input type="text" placeholder="Phone Number">
  </div>

  <!-- PAYMENT OPTIONS -->
  <div class="checkout-box">
    <h2>Payment Method</h2>

    <label><input type="radio" name="payment"> Credit Card</label>
    <label><input type="radio" name="payment"> UPI</label>
    <label><input type="radio" name="payment"> Cash on Delivery</label>
  </div>

  <!-- ORDER SUMMARY -->
  <div class="checkout-box">
    <h2>Order Summary</h2>
    <p>Price: ₹2,999</p>
    <p>Discount: ₹500</p>
    <p><strong>Total: ₹2,499</strong></p>
  </div>

</div>

<!-- PLACE ORDER -->
<div class="place-order">
  <a href="order-success.html" class="place-btn">Place Order</a>
</div>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 PulseFit. All rights reserved.</p>
</footer>

</body>
</html>
